version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    # Core linters (enabled by default)
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    
    # Bug Detection
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errchkjson
    - exhaustive
    - gocheckcompilerdirectives
    - gochecksumtype
    - gosmopolitan
    - loggercheck
    - makezero
    - musttag
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - protogetter
    - reassign
    - recvcheck
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - testifylint
    - zerologlint
    
    # Performance
    - fatcontext
    - perfsprint
    - prealloc
    - unconvert
    
    # Security
    - gosec
    
    # Style & Best Practices
    - canonicalheader
    - containedctx
    - copyloopvar
    - decorder
    - dupword
    - errname
    - exptostd
    - gci
    - ginkgolinter
    - gocritic
    - godot
    - godox
    - gofmt
    - gofumpt
    - goheader
    - goimports
    - goprintffuncname
    - grouper
    - iface
    - importas
    - inamedparam
    - intrange
    - mirror
    - misspell
    - nonamedreturns
    - nosprintfhostport
    - revive
    - sloglint
    - stylecheck
    - tagalign
    - tagliatelle
    - usestdlibvars
    - whitespace
    - wsl
    
    # Complexity
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - maintidx
    - nestif
    
    # Code Quality
    - dogsled
    - dupl
    - goconst
    - nakedret
    - predeclared
    - unparam
    - wastedassign
    
    # Error Handling
    - err113
    - errorlint
    - wrapcheck
    
    # Testing
    - paralleltest
    - testableexamples
    - testpackage
    - thelper
    - tparallel
    - usetesting
    
    # Code Restrictions
    - depguard
    - forbidigo
    - forcetypeassert
    - gochecknoglobals
    - gochecknoinits
    - gomoddirectives
    - gomodguard
    - ireturn
    - lll
    - mnd
    - nlreturn
    - varnamelen
    
    # Linter Configuration
    - nolintlint
    
    # Monitoring & Observability
    - promlinter

linters-settings:
  gocyclo:
    min-complexity: 25
  gocognit:
    min-complexity: 90
  cyclop:
    max-complexity: 25
  funlen:
    lines: 120
    statements: 60
  maintidx:
    under: 20
  nestif:
    min-complexity: 12
  
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
  
  revive:
    rules:
      - name: exported
        disabled: false
      - name: var-naming
        disabled: false
      - name: package-comments
        disabled: true
  
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/your-org)
    custom-order: true
  
  gofumpt:
    extra-rules: true
  
  godot:
    scope: declarations
    capital: true
  
  err113:
    check-error-free-funcs: true
  
  errcheck:
    check-type-assertions: true
    check-blank: true
  
  exhaustive:
    default-signifies-exhaustive: true
  
  govet:
    enable-all: true
    disable:
      - shadow
      - fieldalignment
  
  staticcheck:
    checks: ["all"]
  
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
  
  gosec:
    excludes:
      - G204
      - G404
  
  lll:
    line-length: 120
    tab-width: 4
  
  mnd:
    checks:
      - argument
      - case
      - condition
      - operation
      - return
      - assign
    ignored-numbers:
      - '0'
      - '1'
      - '2'
      - '3'
      - '4'
      - '8'
      - '10'
      - '64'
      - '100'
      - '1024'
    ignored-functions:
      - 'os.MkdirAll'
      - 'os.OpenFile'
      - 'os.WriteFile'
  
  ireturn:
    allow:
      - anon
      - error
      - empty
      - stdlib
  
  forbidigo:
    forbid:
      - p: ^print.*$
        msg: "use logging instead"
      - p: ^fmt\.Print.*$
        msg: "use logging instead"
  
  gomoddirectives:
    replace-local: true
  
  gomodguard:
    blocked:
      modules:
        - github.com/pkg/errors:
            recommendations:
              - errors
              - fmt
  
  nlreturn:
    block-size: 2
  
  testpackage:
    skip-regexp: '(export|internal)_test\.go'
  
  paralleltest:
    ignore-missing: true
  
  exhaustruct:
    exclude:
      - 'testing\.T'
  
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
    ignorePackageGlobs:
      - github.com/your-org/*
  
  tagliatelle:
    case:
      rules:
        json: snake
        yaml: snake
        xml: camel
        bson: camel
        avro: snake
        mapstructure: kebab
  
  varnamelen:
    min-name-length: 2
    ignore-names:
      - err
      - i
      - j
      - k
      - v
      - id
      - ok
    ignore-decls:
      - t testing.T
      - e error
  
  nakedret:
    max-func-lines: 30
  
  dogsled:
    max-blank-identifiers: 2
  
  depguard:
    rules:
      main:
        deny:
          - pkg: io/ioutil
            desc: "use os or io package instead"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true
  
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec
        - wrapcheck
        - gocognit
        - gocyclo
        - cyclop
        - funlen
        - maintidx
        - unparam
        - gocritic
        - err113
        - errcheck
        - exhaustive
        - exhaustruct
        - varnamelen
        - ireturn
        - forcetypeassert
        - goconst
        - paralleltest
        - tparallel
        - gochecknoglobals
        - gochecknoinits
        - forbidigo
        - mnd
        - nlreturn
        - wsl
        - lll
        - nonamedreturns
        - testpackage
    
    - path: _test\.go
      text: "use of `fmt.Sprintf`"
      linters:
        - perfsprint
    
    - path: _test\.go
      text: "use of `fmt.Print"
      linters:
        - forbidigo
    
    - linters:
        - gocritic
      text: "hugeParam"
    
    - linters:
        - gocritic
      text: "unnamedResult"
    
    - linters:
        - wrapcheck
      text: "error returned from external package"
    
    - linters:
        - wrapcheck
      text: "error returned from interface method"
    
    - linters:
        - gosec
      text: "G204"
    
    - linters:
        - gosec
      text: "G404"
    
    - linters:
        - unparam
      text: "always receives"
    
    - linters:
        - err113
      text: "do not define dynamic errors"
    
    - linters:
        - varnamelen
      text: "parameter name '.+' is too short"
    
    - linters:
        - ireturn
      text: "returns interface"
    
    - linters:
        - lll
      source: "^//go:generate "
    
    - linters:
        - godox
      source: "TODO|FIXME"
    
    - path: cmd/
      linters:
        - gochecknoglobals
        - gochecknoinits
        - forbidigo
    
    - path: internal/version/
      linters:
        - gochecknoglobals
    
    - path: internal/adapters/
      linters:
        - gochecknoglobals
        - gochecknoinits
    
    - path: internal/app/
      linters:
        - gochecknoglobals
        - forbidigo
    
    - path: internal/runtime/
      linters:
        - gochecknoglobals
    
    - path: internal/store/
      linters:
        - gochecknoglobals
    
    - path: ref/tmp/
      linters:
        - all
    
    - linters:
        - errcheck
      text: "Error return value.*is not checked"
      source: "_, _ ="
    
    - linters:
        - funlen
      path: internal/runtime/state_machine\.go
    
    - linters:
        - exhaustive
      path: internal/runtime/state_machine\.go
    
    - path: ".*_generated\\.go$"
      linters:
        - all
    
    - linters:
        - staticcheck
      text: "SA9003:"
    
    - linters:
        - lll
      path: internal/runtime/state_machine\.go
    
    - linters:
        - lll
      path: internal/workflow/
    
    - linters:
        - lll
      path: internal/adapters/
    
    - linters:
        - lll
      path: internal/app/
    
    - linters:
        - varnamelen
      text: "variable name 'r' is too short"
    
    - linters:
        - musttag
      path: internal/workflow/persist\.go
    
    - linters:
        - tagliatelle
      path: internal/workflow/model\.go
